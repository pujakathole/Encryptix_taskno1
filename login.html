<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Yasooja Beauty</title>
  <link rel="stylesheet" href="task1.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <header>
    <nav>
      <a href="task1.html">Home &nbsp;</a>
      <a href="#">Products &nbsp;</a>
      <a href="#">About Us &nbsp;</a>
      <a href="#">Contact &nbsp;</a>
      <a href="login.html">Login &nbsp;</a>
    </nav>
    <h1>Yasooja Beauty</h1>
  </header>
  <main>
    <section class="login-section">
      <div class="login-container">
        <h2 class="login-title">Welcome Back</h2>
        <p class="login-subtitle">Sign in to your Yasooja Beauty account</p>
        <form id="login-form" action="#" method="post">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
            <span class="error-message" id="email-error"></span>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required minlength="6">
            <span class="error-message" id="password-error"></span>
          </div>
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" name="remember">
              Remember me
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>
          <button type="submit" class="login-btn">Sign In</button>
        </form>
        <p class="signup-link">Don't have an account? <a href="#">Sign up</a></p>
      </div>
    </section>
  </main>
  <footer>
    <p>&copy; Yasooja Beauty 2024</p>
    <ul class="social-media">
      <li><a href="#"><i class="fab fa-facebook-f">facebook.com/yasoojaofficial</i></a></li>
      <li><a href="#"><i class="fab fa-instagram">@yasooja_cosmetics</i></a></li>
      <li><a href="#"><i class="fab fa-twitter">@yasooja_cosmetics</i></a></li>
    </ul>
  </footer>
  <script src="login.js"></script>
</body>
</html>
