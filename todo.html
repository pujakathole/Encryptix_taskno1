<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="todo.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <div class="container">
    <div class="header">
      <h1><i class="fas fa-check-double"></i> My To-Do List</h1>
      <p class="subtitle">Stay organized, get things done</p>
    </div>

    <div class="progress-section">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-text" id="progressText">0% complete</span>
    </div>

    <div class="input-section">
      <div class="input-wrapper">
        <i class="fas fa-plus-circle input-icon"></i>
        <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
      </div>
      <select id="prioritySelect" title="Priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button id="addBtn" title="Add task">
        <i class="fas fa-plus"></i> Add
      </button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">
        <i class="fas fa-list"></i> All
      </button>
      <button class="filter-btn" data-filter="pending">
        <i class="fas fa-clock"></i> Pending
      </button>
      <button class="filter-btn" data-filter="completed">
        <i class="fas fa-check-circle"></i> Done
      </button>
    </div>

    <ul id="taskList"></ul>

    <div class="summary">
      <span id="taskCount">0 tasks</span>
      <button id="clearCompleted">
        <i class="fas fa-trash-alt"></i> Clear Completed
      </button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="todo.js"></script>
</body>
</html>
